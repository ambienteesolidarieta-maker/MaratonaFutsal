<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modulo Iscrizione Maratona Futsal Montaione 2026_1</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #121821;
      --panel-2: #1a2230;
      --text: #f3f6fb;
      --muted: #9aa4b2;
      --line: rgba(255,255,255,0.08);
      --accent: #f0c14b;
      --accent-2: #ffdd78;
      --danger: #ff6b6b;
      --ok: #37d67a;
      --shadow: 0 10px 30px rgba(0,0,0,0.35);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(240,193,75,0.10), transparent 30%),
        linear-gradient(180deg, #0b0f14 0%, #0a0d12 100%);
      color: var(--text);
    }

    body.is-busy {
      overflow: hidden;
    }

    a {
      color: var(--accent-2);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .wrap {
      width: 100%;
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    .card {
      background: rgba(18,24,33,0.92);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .hero {
      padding: 28px 22px 20px;
      text-align: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border-bottom: 1px solid var(--line);
    }

    .hero img {
      max-width: 130px;
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto 14px;
      border-radius: 16px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      color: white;
    }

    .team-name {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
      color: var(--accent-2);
    }

    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .roles-box {
      margin-top: 16px;
      padding: 14px;
      border-radius: 14px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      display: none;
    }

    .roles-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #dce3ed;
    }

    .roles-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    .body {
      padding: 22px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: bold;
      color: #dce3ed;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 14px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: white;
      outline: none;
      font-size: 16px;
    }

    .field input:focus,
    .field select:focus {
      border-color: rgba(240,193,75,0.55);
      box-shadow: 0 0 0 3px rgba(240,193,75,0.12);
    }

    .field input[type="file"] {
      padding: 12px;
    }

    .hint {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .check-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 14px;
      border-radius: 14px;
      background: var(--panel-2);
      border: 1px solid var(--line);
    }

    .check-row input[type="checkbox"] {
      margin-top: 3px;
      transform: scale(1.15);
      width: auto;
      flex: 0 0 auto;
    }

    .check-text {
      margin: 0;
      font-weight: normal;
      line-height: 1.6;
      color: var(--text);
    }

    .sig-box {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--line);
    }

 #signatureCanvas {
  display: block;
  width: 100%;
  height: 220px;
  background: #fff;
  cursor: crosshair;
  user-select: none;
  -webkit-user-select: none;
}

    .sig-actions {
      display: flex;
      gap: 10px;
      padding: 12px;
      background: #f5f5f5;
      border-top: 1px solid #ddd;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      transition: transform .15s ease, opacity .15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: .7;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #161616;
    }

    .btn-secondary {
      background: #212b3a;
      color: white;
      border: 1px solid var(--line);
    }

    .submit-wrap {
      display: flex;
      justify-content: center;
      margin-top: 26px;
    }

    .submit-btn {
      min-width: 230px;
      padding: 16px 22px;
      font-size: 16px;
    }

    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      display: none;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status.ok {
      display: block;
      background: rgba(55,214,122,0.12);
      border: 1px solid rgba(55,214,122,0.25);
      color: #baf3cf;
    }

    .status.err {
      display: block;
      background: rgba(255,107,107,0.12);
      border: 1px solid rgba(255,107,107,0.25);
      color: #ffd1d1;
    }

    .loader {
      text-align: center;
      color: var(--muted);
      padding: 24px 10px;
      font-size: 14px;
    }

    .busy-overlay {
      position: fixed;
      inset: 0;
      background: rgba(8, 12, 17, 0.72);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }

    .busy-overlay.show {
      display: flex;
    }

    .busy-card {
      width: 100%;
      max-width: 360px;
      background: rgba(18,24,33,0.96);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
      padding: 24px 20px;
      text-align: center;
    }

    .spinner {
      width: 42px;
      height: 42px;
      margin: 0 auto 14px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.12);
      border-top-color: var(--accent);
      animation: spin .9s linear infinite;
    }

    .busy-title {
      font-size: 17px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 8px;
    }

    .busy-text {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .success-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .success-card {
      width: 100%;
      max-width: 460px;
      background: rgba(18,24,33,0.96);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 32px 24px;
      text-align: center;
    }

    .success-icon {
      width: 68px;
      height: 68px;
      margin: 0 auto 18px;
      border-radius: 50%;
      background: rgba(55,214,122,0.16);
      border: 1px solid rgba(55,214,122,0.30);
      color: #baf3cf;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: bold;
    }

    .success-title {
      margin: 0 0 10px;
      font-size: 24px;
      color: #fff;
    }

    .success-text {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 22px;
      }

      .team-name {
        font-size: 17px;
      }

      .body {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hero">
        <img src="logomar.jpeg" alt="Logo" />
        <h1>Modulo Iscrizione Maratona Futsal Montaione 2026_1</h1>
        <div id="teamName" class="team-name">Caricamento squadra...</div>
        <div class="sub">Compila tutti i campi richiesti</div>
      </div>

      <div class="body">
        <div id="loadingBox" class="loader">Caricamento dati squadra...</div>

        <div id="rolesBox" class="roles-box">
          <div class="roles-title">Disponibilità ruoli</div>
          <div id="rolesList" class="roles-list"></div>
        </div>

        <form id="registrationForm" style="display:none;">
          <div class="grid">
            <div class="field">
              <label for="nome">Nome *</label>
              <input type="text" id="nome" required />
            </div>

            <div class="field">
              <label for="cognome">Cognome *</label>
              <input type="text" id="cognome" required />
            </div>

            <div class="field">
              <label for="natoA">Nato a *</label>
              <input type="text" id="natoA" required />
            </div>

            <div class="field">
              <label for="dataNascita">Data di nascita *</label>
              <input type="date" id="dataNascita" required />
            </div>

            <div class="field">
              <label for="residenteIn">Residente in *</label>
              <input type="text" id="residenteIn" required />
            </div>

            <div class="field">
              <label for="provincia">Provincia *</label>
              <input type="text" id="provincia" maxlength="2" required />
            </div>

            <div class="field">
              <label for="via">Via *</label>
              <input type="text" id="via" required />
            </div>

            <div class="field">
              <label for="civico">N° civico *</label>
              <input type="text" id="civico" required />
            </div>

            <div class="field">
              <label for="telefono">Telefono *</label>
              <input type="tel" id="telefono" required />
            </div>

            <div class="field">
              <label for="email">Email *</label>
              <input type="email" id="email" required />
            </div>

            <div class="field full">
              <label for="ruolo">Ruolo *</label>
              <select id="ruolo" required>
                <option value="">Seleziona ruolo</option>
                <option value="Giocatore">Giocatore</option>
                <option value="Allenatore">Allenatore</option>
                <option value="Dirigente">Dirigente</option>
              </select>
              <div class="hint">Limiti: Giocatore max 15, Allenatore max 1, Dirigente max 1.</div>
            </div>

            <div class="field full">
              <label for="docIdentita">Foto documento identità *</label>
              <input type="file" id="docIdentita" accept="image/*" capture="environment" required />
            </div>

            <div class="field full">
              <label for="visitaSportiva">Foto visita sportiva *</label>
              <input type="file" id="visitaSportiva" accept="image/*" capture="environment" required />
            </div>

            <div class="field full">
              <label>Accettazione documenti *</label>
              <div class="check-row">
                <input type="checkbox" id="accettazione" required />
                <label for="accettazione" class="check-text">
                  Dichiaro di aver letto e di accettare il
                  <a href="#" target="_blank" rel="noopener noreferrer">regolamento</a>,
                  la
                  <a href="#" target="_blank" rel="noopener noreferrer">DICHIARAZIONE DI RESPONSABILITÀ</a>
                  e i termini della
                  <a href="#" target="_blank" rel="noopener noreferrer">liberatoria</a>.
                </label>
              </div>
            </div>

            <div class="field full">
              <label>Firma grafica *</label>
              <div class="sig-box">
                <canvas id="signatureCanvas"></canvas>
                <div class="sig-actions">
                  <button type="button" class="btn btn-secondary" id="clearSignatureBtn">Pulisci firma</button>
                </div>
              </div>
            </div>
          </div>

          <div class="submit-wrap">
            <button type="submit" class="btn btn-primary submit-btn" id="submitBtn">Invia iscrizione</button>
          </div>
        </form>

        <div id="statusBox" class="status"></div>
      </div>
    </div>
  </div>

  <div id="busyOverlay" class="busy-overlay" aria-hidden="true">
    <div class="busy-card">
      <div class="spinner"></div>
      <div class="busy-title">Invio in corso</div>
      <div class="busy-text">Attendi qualche secondo. Stiamo caricando documenti, firma e modulo.</div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwllcWP71siN-WNLJuel5cMqWudOQj75A5Oiy1csfwfhCb_8LlGNHys1a2Bcnm80te2/exec';

    let teamToken = '';
    let teamCodeFromUrl = '';
    let teamInfo = null;

    const loadingBox = document.getElementById('loadingBox');
    const form = document.getElementById('registrationForm');
    const teamNameEl = document.getElementById('teamName');
    const statusBox = document.getElementById('statusBox');
    const submitBtn = document.getElementById('submitBtn');
    const rolesBox = document.getElementById('rolesBox');
    const rolesList = document.getElementById('rolesList');
    const ruoloSelect = document.getElementById('ruolo');
    const busyOverlay = document.getElementById('busyOverlay');

    function showStatus(type, message) {
      statusBox.className = 'status ' + type;
      statusBox.innerHTML = message;
    }

    function setBusy(isBusy) {
      busyOverlay.classList.toggle('show', isBusy);
      document.body.classList.toggle('is-busy', isBusy);
      submitBtn.disabled = isBusy;

      const controls = form.querySelectorAll('input, select, button, textarea');
      controls.forEach(el => {
        if (isBusy) {
          el.setAttribute('disabled', 'disabled');
        } else {
          if (el.id !== 'submitBtn') el.removeAttribute('disabled');
        }
      });

      if (!isBusy) {
        submitBtn.disabled = false;
      }
    }


function showSuccessAndClose() {
  document.body.className = '';
  document.body.innerHTML = `
    <div class="success-screen">
      <div class="success-card">
        <div class="success-icon">✓</div>
        <h2 class="success-title">Invio completato</h2>
        <p class="success-text">
          La richiesta è stata inviata correttamente.<br>
          Questa finestra può essere chiusa.
        </p>
      </div>
    </div>
  `;

  setTimeout(() => {
    try {
      window.open('', '_self');
      window.close();
    } catch (e) {}
  }, 1200);
}


    function getUrlParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        team_code: (
          params.get('team_code') ||
          params.get('team') ||
          ''
        ).trim(),
        token: (
          params.get('token_form') ||
          params.get('token') ||
          params.get('t') ||
          ''
        ).trim()
      };
    }

    async function postJson(payload) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 25000);

      try {
        const res = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify(payload),
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          signal: controller.signal
        });

        const text = await res.text();

        try {
          return JSON.parse(text);
        } catch (e) {
          throw new Error('Risposta backend non valida: ' + text.slice(0, 200));
        }
      } catch (err) {
        if (err.name === 'AbortError') {
          throw new Error('Timeout chiamata backend');
        }
        throw err;
      } finally {
        clearTimeout(timeout);
      }
    }

    function renderRoles(roles) {
      if (!roles) return;

      const items = ['Giocatore', 'Allenatore', 'Dirigente'];
      rolesList.innerHTML = '';

      items.forEach(role => {
        const info = roles[role];
        if (!info) return;

        const row = document.createElement('div');
        row.textContent = `${role}: ${info.current}/${info.max}` + (info.available ? '' : ' - COMPLETO');
        rolesList.appendChild(row);
      });

      Array.from(ruoloSelect.options).forEach(opt => {
        if (!opt.value) return;
        const info = roles[opt.value];
        opt.disabled = info ? !info.available : false;
      });

      rolesBox.style.display = 'block';
    }

    async function loadTeamInfo() {
      const urlData = getUrlParams();
      teamToken = urlData.token;
      teamCodeFromUrl = urlData.team_code;

      if (!teamCodeFromUrl) {
        loadingBox.style.display = 'none';
        teamNameEl.textContent = 'Team mancante';
        showStatus('err', 'Nel link non è presente il parametro team.');
        return;
      }

      if (!teamToken) {
        loadingBox.style.display = 'none';
        teamNameEl.textContent = 'Token mancante';
        showStatus('err', 'Nel link non è presente il token.');
        return;
      }

      try {
        const data = await postJson({
          action: 'getTeamInfo',
          team_code: teamCodeFromUrl,
          token: teamToken,
          token_form: teamToken
        });

        if (!data.ok) {
          throw new Error(data.error || 'Squadra non trovata');
        }

teamInfo = data;
teamNameEl.textContent = data.team_name || data.sheet_name || teamCodeFromUrl;
renderRoles(data.roles);
loadingBox.style.display = 'none';
form.style.display = 'block';

requestAnimationFrame(() => {
  if (window.refreshSignatureCanvas) {
    window.refreshSignatureCanvas();
  }
});
      } catch (err) {
        loadingBox.style.display = 'none';
        teamNameEl.textContent = 'Squadra non trovata';
        showStatus('err', err.message || 'Errore recupero squadra');
      }
    }


function setupSignatureCanvas() {
  const canvas = document.getElementById('signatureCanvas');
  const ctx = canvas.getContext('2d');

  let drawing = false;
  let hasSignature = false;
  let lastX = 0;
  let lastY = 0;

  function initContext() {
    ctx.lineWidth = 2.6;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#111';
  }

  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    if (!rect.width || !rect.height) return;

    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    canvas.width = Math.floor(rect.width * ratio);
    canvas.height = Math.floor(rect.height * ratio);

    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(ratio, ratio);
    initContext();
  }

  function getPoint(e) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: e.clientX - rect.left,
      y: e.clientY - rect.top
    };
  }

  function beginStroke(x, y) {
    drawing = true;
    hasSignature = true;
    lastX = x;
    lastY = y;

    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + 0.01, y + 0.01);
    ctx.stroke();
  }

  function continueStroke(x, y) {
    if (!drawing) return;
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(x, y);
    ctx.stroke();
    lastX = x;
    lastY = y;
  }

  function endStroke() {
    drawing = false;
  }

  window.refreshSignatureCanvas = function () {
    resizeCanvas();
  };

  window.addEventListener('resize', resizeCanvas);

  canvas.addEventListener('mousedown', (e) => {
    const p = getPoint(e);
    beginStroke(p.x, p.y);
    e.preventDefault();
  });

  canvas.addEventListener('mousemove', (e) => {
    if (!drawing) return;
    const p = getPoint(e);
    continueStroke(p.x, p.y);
    e.preventDefault();
  });

  window.addEventListener('mouseup', endStroke);
  canvas.addEventListener('mouseleave', endStroke);

  canvas.addEventListener('touchstart', (e) => {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    beginStroke(t.clientX - rect.left, t.clientY - rect.top);
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    if (!drawing) return;
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    continueStroke(t.clientX - rect.left, t.clientY - rect.top);
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchend', endStroke, { passive: false });

  document.getElementById('clearSignatureBtn').addEventListener('click', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    initContext();
    drawing = false;
    hasSignature = false;
  });

  window.getSignatureDataUrl = function () {
    return hasSignature ? canvas.toDataURL('image/png') : '';
  };
}

  function resizeCanvas() {
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    const rect = canvas.getBoundingClientRect();

    canvas.width = Math.max(1, Math.floor(rect.width * ratio));
    canvas.height = Math.max(1, Math.floor(rect.height * ratio));

    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(ratio, ratio);
    initContext();
  }

  function getPointFromMouseEvent(e) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: e.clientX - rect.left,
      y: e.clientY - rect.top
    };
  }

  function beginStroke(x, y) {
    drawing = true;
    hasSignature = true;
    lastX = x;
    lastY = y;

    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + 0.01, y + 0.01);
    ctx.stroke();
  }

  function continueStroke(x, y) {
    if (!drawing) return;
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(x, y);
    ctx.stroke();
    lastX = x;
    lastY = y;
  }

  function endStroke() {
    drawing = false;
  }

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  canvas.addEventListener('mousedown', (e) => {
    const p = getPointFromMouseEvent(e);
    beginStroke(p.x, p.y);
    e.preventDefault();
  });

  canvas.addEventListener('mousemove', (e) => {
    if (!drawing) return;
    const p = getPointFromMouseEvent(e);
    continueStroke(p.x, p.y);
    e.preventDefault();
  });

  window.addEventListener('mouseup', () => {
    endStroke();
  });

  canvas.addEventListener('mouseleave', () => {
    endStroke();
  });

  canvas.addEventListener('touchstart', (e) => {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    beginStroke(t.clientX - rect.left, t.clientY - rect.top);
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    if (!drawing) return;
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    continueStroke(t.clientX - rect.left, t.clientY - rect.top);
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchend', () => {
    endStroke();
  }, { passive: false });

  document.getElementById('clearSignatureBtn').addEventListener('click', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    initContext();
    drawing = false;
    hasSignature = false;
  });

  window.getSignatureDataUrl = function () {
    return hasSignature ? canvas.toDataURL('image/png') : '';
  };
}

    async function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result));
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function formatTodayIT() {
      const d = new Date();
      const gg = String(d.getDate()).padStart(2, '0');
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const yyyy = d.getFullYear();
      return `${gg}/${mm}/${yyyy}`;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      statusBox.style.display = 'none';

      const signatureDataUrl = window.getSignatureDataUrl();
      if (!signatureDataUrl) {
        showStatus('err', 'Firma obbligatoria.');
        return;
      }

      try {
        const docInput = document.getElementById('docIdentita');
        const visitaInput = document.getElementById('visitaSportiva');

        const docFile = docInput && docInput.files ? docInput.files[0] : null;
        const visitaFile = visitaInput && visitaInput.files ? visitaInput.files[0] : null;

        if (!docFile || !visitaFile) {
          throw new Error('Carica entrambi gli allegati.');
        }

        setBusy(true);

        const payload = {
          action: 'submitRegistration',
          team_code: teamInfo?.team_code || teamCodeFromUrl,
          token: teamToken,
          token_form: teamToken,
          team_name: teamInfo?.team_name || '',
          today: formatTodayIT(),
          nome: document.getElementById('nome').value.trim(),
          cognome: document.getElementById('cognome').value.trim(),
          nato_a: document.getElementById('natoA').value.trim(),
          data_nascita: document.getElementById('dataNascita').value,
          residente_in: document.getElementById('residenteIn').value.trim(),
          provincia: document.getElementById('provincia').value.trim().toUpperCase(),
          via: document.getElementById('via').value.trim(),
          civico: document.getElementById('civico').value.trim(),
          telefono: document.getElementById('telefono').value.trim(),
          email: document.getElementById('email').value.trim(),
          ruolo: document.getElementById('ruolo').value,
          accettazione: document.getElementById('accettazione').checked,
          firma_base64: signatureDataUrl,
          documento_identita: {
            name: docFile.name,
            data: await fileToBase64(docFile)
          },
          visita_sportiva: {
            name: visitaFile.name,
            data: await fileToBase64(visitaFile)
          }
        };

        const result = await postJson(payload);

        if (!result.ok) {
          throw new Error(result.error || 'Invio non riuscito');
        }

        showSuccessAndClose();
      } catch (err) {
        setBusy(false);
        showStatus('err', err.message || 'Errore durante l’invio');
      }
    });

    setupSignatureCanvas();
    loadTeamInfo();
  </script>
</body>
</html>
