<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maratona Futsal Montaione 2026</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: rgba(18, 24, 33, 0.92);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #f3f6fb;
      --muted: #a7b0bc;
      --accent: #f0c14b;
      --accent-2: #ffdd78;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.38);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(240,193,75,0.12), transparent 30%),
        linear-gradient(180deg, #0b0f14 0%, #0a0d12 100%);
      color: var(--text);
      overflow: hidden;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .stage {
      width: 100%;
      max-width: 560px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
    }

    .splash {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: splashFadeOut 1.1s ease forwards;
      animation-delay: 1.7s;
      z-index: 2;
      pointer-events: none;
    }

    .splash img {
      width: min(62vw, 260px);
      max-width: 260px;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      animation: logoPulse 1.4s ease;
    }

    .card {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      text-align: center;
      padding: clamp(24px, 5vw, 38px);
      opacity: 0;
      transform: translateY(16px);
      animation: cardReveal 0.8s ease forwards;
      animation-delay: 2.25s;
    }

    .card-logo {
      width: min(42vw, 150px);
      aspect-ratio: 1 / 1;
      margin: 0 auto 16px;
      display: block;
      object-fit: contain;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.24);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(24px, 5.6vw, 34px);
      line-height: 1.15;
      color: #ffffff;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: clamp(14px, 3.8vw, 16px);
      line-height: 1.5;
    }

    .actions {
      margin-top: 28px;
      display: flex;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(100%, 320px);
      min-height: 56px;
      padding: 16px 22px;
      border-radius: 16px;
      border: 0;
      text-decoration: none;
      font-weight: 700;
      font-size: clamp(15px, 4vw, 17px);
      color: #161616;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 12px 28px rgba(240,193,75,0.22);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 32px rgba(240,193,75,0.28);
    }

    .btn:active {
      transform: translateY(0);
      opacity: 0.96;
    }

    @keyframes logoPulse {
      0% {
        opacity: 0;
        transform: scale(0.88);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes splashFadeOut {
      0% {
        opacity: 1;
        transform: scale(1);
      }
      100% {
        opacity: 0;
        transform: scale(0.95);
        visibility: hidden;
      }
    }

    @keyframes cardReveal {
      0% {
        opacity: 0;
        transform: translateY(16px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 14px;
      }

      .card {
        border-radius: 22px;
        padding: 22px 18px 24px;
      }

      .splash img {
        width: min(68vw, 220px);
      }

      .card-logo {
        width: min(44vw, 130px);
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <div class="splash">
      <img src="logomar.jpeg" alt="Logo Maratona Futsal Montaione 2026">
    </div>

    <section class="card">
      <img class="card-logo" src="logomar.jpeg" alt="Logo Maratona Futsal Montaione 2026">

      <h1>Maratona Futsal Montaione 2026</h1>
      <p class="subtitle">Portale iscrizioni ufficiale</p>

      <div class="actions">
        <a id="startBtn" class="btn" href="form.html">Modulo Iscrizione 2026</a>
      </div>
    </section>
  </main>

  <script>
    function getUrlParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        team: (params.get('team') || params.get('team_code') || '').trim(),
        token: (params.get('token') || params.get('token_form') || params.get('t') || '').trim()
      };
    }

    function buildFormUrl() {
      const p = getUrlParams();
      const out = new URLSearchParams();

      if (p.team) out.set('team', p.team);
      if (p.token) out.set('token', p.token);

      const query = out.toString();
      return query ? `form.html?${query}` : 'form.html';
    }

    document.getElementById('startBtn').href = buildFormUrl();
  </script>
</body>
</html>
