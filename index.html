<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maratona Futsal Montaione 2026</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: rgba(18, 24, 33, 0.92);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #f3f6fb;
      --muted: #a7b0bc;
      --accent: #f0c14b;
      --accent-2: #ffdd78;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.38);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(240,193,75,0.12), transparent 30%),
        linear-gradient(180deg, #0b0f14 0%, #0a0d12 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .shell {
      width: 100%;
      max-width: 520px;
    }

    .card {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      text-align: center;
      padding: clamp(24px, 5vw, 38px);
      opacity: 0;
      transform: translateY(18px);
      animation: cardIn 0.9s ease forwards;
      animation-delay: 0.35s;
    }

    .logo-box {
      width: min(56vw, 210px);
      aspect-ratio: 1 / 1;
      margin: 0 auto 18px;
      border-radius: 22px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
      opacity: 0;
      transform: scale(0.88);
      animation: logoIn 1.2s ease forwards;
    }

    .logo-box img {
      width: 78%;
      height: 78%;
      object-fit: contain;
      display: block;
      border-radius: 16px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 5.6vw, 34px);
      line-height: 1.15;
      color: #ffffff;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: clamp(14px, 3.8vw, 16px);
      line-height: 1.5;
    }

    .team-badge {
      display: none;
      margin: 14px auto 0;
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(240,193,75,0.10);
      border: 1px solid rgba(240,193,75,0.20);
      color: var(--accent-2);
      font-weight: bold;
      font-size: 14px;
      width: fit-content;
      max-width: 100%;
      word-break: break-word;
    }

    .actions {
      margin-top: 28px;
      display: flex;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(100%, 320px);
      min-height: 56px;
      padding: 16px 22px;
      border-radius: 16px;
      border: 0;
      text-decoration: none;
      font-weight: 700;
      font-size: clamp(15px, 4vw, 17px);
      color: #161616;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 12px 28px rgba(240,193,75,0.22);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 32px rgba(240,193,75,0.28);
    }

    .btn:active {
      transform: translateY(0);
      opacity: 0.96;
    }

    .footer-note {
      margin-top: 18px;
      color: #7f8996;
      font-size: 12px;
      line-height: 1.4;
    }

    @keyframes logoIn {
      0% {
        opacity: 0;
        transform: scale(0.88);
      }
      60% {
        opacity: 1;
        transform: scale(1.03);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 14px;
        align-items: center;
      }

      .card {
        border-radius: 22px;
        padding: 22px 18px 24px;
      }

      .logo-box {
        width: min(62vw, 190px);
        border-radius: 20px;
        margin-bottom: 16px;
      }

      .btn {
        width: 100%;
      }
    }

    @media (min-width: 900px) {
      .shell {
        max-width: 560px;
      }

      .logo-box {
        width: 220px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="card">
      <div class="logo-box">
        <img src="logomar.jpeg" alt="Logo Maratona Futsal Montaione 2026">
      </div>

      <h1>Maratona Futsal Montaione 2026</h1>
      <p class="subtitle">Portale iscrizioni ufficiale</p>

      <div id="teamBadge" class="team-badge"></div>

      <div class="actions">
        <a id="startBtn" class="btn" href="form.html">Modulo Iscrizione 2026</a>
      </div>

      <div class="footer-note">
        Accedi al modulo tramite il link ricevuto dalla tua squadra.
      </div>
    </section>
  </main>

  <script>
    function getUrlParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        team: (params.get('team') || '').trim(),
        team_code: (params.get('team_code') || '').trim(),
        token: (params.get('token') || '').trim(),
        token_form: (params.get('token_form') || '').trim()
      };
    }

    function buildFormUrl() {
      const p = getUrlParams();
      const out = new URLSearchParams();

      const teamValue = p.team || p.team_code;
      const tokenValue = p.token || p.token_form;

      if (teamValue) {
        out.set('team', teamValue);
      }

      if (tokenValue) {
        out.set('token', tokenValue);
      }

      const query = out.toString();
      return query ? `form.html?${query}` : 'form.html';
    }

    function renderTeamBadge() {
      const p = getUrlParams();
      const teamValue = p.team || p.team_code;
      const badge = document.getElementById('teamBadge');

      if (teamValue) {
        badge.textContent = `Squadra: ${teamValue}`;
        badge.style.display = 'block';
      }
    }

    function init() {
      document.getElementById('startBtn').href = buildFormUrl();
      renderTeamBadge();
    }

    init();
  </script>
</body>
</html>
