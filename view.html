<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vista Squadra - Maratona Futsal Montaione 2026</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #121821;
      --panel-2: #1a2230;
      --text: #f3f6fb;
      --muted: #9aa4b2;
      --line: rgba(255,255,255,0.08);
      --accent: #f0c14b;
      --accent-2: #ffdd78;
      --ok: #37d67a;
      --danger: #ff6b6b;
      --shadow: 0 10px 30px rgba(0,0,0,0.35);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(240,193,75,0.10), transparent 30%),
        linear-gradient(180deg, #0b0f14 0%, #0a0d12 100%);
      color: var(--text);
    }

    body.app-ready #splashScreen {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    body.app-ready #appRoot {
      opacity: 1;
      transform: none;
    }

    a {
      color: var(--accent-2);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    button {
      font-family: inherit;
    }

    #splashScreen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(240,193,75,0.13), transparent 30%),
        linear-gradient(180deg, #0b0f14 0%, #0a0d12 100%);
      transition: opacity 0.7s ease, visibility 0.7s ease;
    }

    .splash-inner {
      text-align: center;
      padding: 24px;
      animation: splashPulse 1.8s ease-in-out infinite;
    }

    .splash-logo {
      width: min(36vw, 170px);
      max-width: 170px;
      min-width: 90px;
      height: auto;
      display: block;
      margin: 0 auto 18px;
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
    }

    .splash-title {
      margin: 0;
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.3px;
    }

    .splash-sub {
      margin-top: 10px;
      color: var(--accent-2);
      font-size: 14px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    .splash-loader {
      width: 56px;
      height: 56px;
      margin: 22px auto 0;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.10);
      border-top-color: var(--accent);
      animation: spin 1s linear infinite;
    }

    #appRoot {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    .wrap {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    .card {
      background: rgba(18,24,33,0.92);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .hero {
      padding: 28px 22px 20px;
      text-align: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border-bottom: 1px solid var(--line);
    }

    .hero img {
      max-width: 110px;
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto 14px;
      border-radius: 14px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      color: white;
    }

    .team-name {
      margin-top: 10px;
      font-size: 19px;
      font-weight: bold;
      color: var(--accent-2);
    }

    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .body {
      padding: 22px;
    }

    .loader {
      text-align: center;
      color: var(--muted);
      padding: 24px 10px;
      font-size: 14px;
    }

    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      display: none;
      font-size: 14px;
      line-height: 1.5;
    }

    .status.ok {
      display: block;
      background: rgba(55,214,122,0.12);
      border: 1px solid rgba(55,214,122,0.25);
      color: #baf3cf;
    }

    .status.err {
      display: block;
      background: rgba(255,107,107,0.12);
      border: 1px solid rgba(255,107,107,0.25);
      color: #ffd1d1;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    .mini-card {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
    }

    .mini-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .mini-value {
      font-size: 24px;
      font-weight: bold;
      color: white;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel-2);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1020px;
    }

    th, td {
      padding: 13px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: rgba(255,255,255,0.03);
      color: #dce3ed;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    td {
      color: var(--text);
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .empty-box {
      display: none;
      padding: 18px;
      border-radius: 16px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--muted);
      text-align: center;
    }

    .actions-cell {
      width: 72px;
      text-align: center;
    }

    .btn-delete {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid rgba(255,107,107,0.35);
      background: rgba(255,107,107,0.14);
      color: #ff8f8f;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    .btn-delete:hover {
      transform: translateY(-1px);
      background: rgba(255,107,107,0.20);
      border-color: rgba(255,107,107,0.55);
    }

    .btn-delete:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .btn-delete svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .row-deleting {
      opacity: 0.45;
      pointer-events: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes splashPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.025); }
      100% { transform: scale(1); }
    }

    @media (max-width: 900px) {
      .summary-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px) {
      h1 { font-size: 22px; }
      .team-name { font-size: 17px; }
      .body { padding: 16px; }
      .summary-grid { grid-template-columns: 1fr 1fr; }
      .splash-logo { width: min(44vw, 150px); }
    }
  </style>
</head>
<body>
  <div id="splashScreen">
    <div class="splash-inner">
      <img src="logomar.jpeg" alt="Logo Maratona Futsal" class="splash-logo" />
      <h2 class="splash-title">Maratona Futsal</h2>
      <div class="splash-sub">Montaione 2026</div>
      <div class="splash-loader"></div>
    </div>
  </div>

  <div id="appRoot">
    <div class="wrap">
      <div class="card">
        <div class="hero">
          <img src="logomar.jpeg" alt="Logo" />
          <h1>Recap Squadra</h1>
          <div id="teamName" class="team-name">Caricamento squadra...</div>
          <div class="sub">Vista dedicata al dirigente</div>
        </div>

        <div class="body">
          <div id="loadingBox" class="loader">Caricamento dati squadra...</div>

          <div id="contentBox" style="display:none;">
            <div class="summary-grid">
              <div class="mini-card">
                <div class="mini-label">Totale iscritti</div>
                <div id="totaleIscritti" class="mini-value">0</div>
              </div>
              <div class="mini-card">
                <div class="mini-label">Giocatori</div>
                <div id="totGiocatori" class="mini-value">0</div>
              </div>
              <div class="mini-card">
                <div class="mini-label">Allenatori</div>
                <div id="totAllenatori" class="mini-value">0</div>
              </div>
              <div class="mini-card">
                <div class="mini-label">Dirigenti</div>
                <div id="totDirigenti" class="mini-value">0</div>
              </div>
            </div>

            <div id="emptyBox" class="empty-box">Nessun iscritto presente.</div>

            <div id="tableWrap" class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Nome</th>
                    <th>Cognome</th>
                    <th>Ruolo</th>
                    <th>Stato pratica</th>
                    <th>Documento</th>
                    <th>Visita</th>
                    <th>Modulo</th>
                    <th>Azioni</th>
                  </tr>
                </thead>
                <tbody id="rowsBody"></tbody>
              </table>
            </div>
          </div>

          <div id="statusBox" class="status"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwllcWP71siN-WNLJuel5cMqWudOQj75A5Oiy1csfwfhCb_8LlGNHys1a2Bcnm80te2/exec';
    const SPLASH_MIN_MS = 1400;

    const loadingBox = document.getElementById('loadingBox');
    const contentBox = document.getElementById('contentBox');
    const statusBox = document.getElementById('statusBox');
    const teamNameEl = document.getElementById('teamName');
    const rowsBody = document.getElementById('rowsBody');
    const emptyBox = document.getElementById('emptyBox');
    const tableWrap = document.getElementById('tableWrap');

    const splashStartedAt = Date.now();

    let currentRows = [];
    let currentCounters = {};
    let currentTeamCode = '';
    let currentToken = '';
    let currentTeamName = '';

    function showAppAfterSplash() {
      const elapsed = Date.now() - splashStartedAt;
      const wait = Math.max(SPLASH_MIN_MS - elapsed, 0);

      setTimeout(() => {
        document.body.classList.add('app-ready');
      }, wait);
    }

    function showStatus(type, message) {
      statusBox.className = 'status ' + type;
      statusBox.innerHTML = message;
    }

    function clearStatus() {
      statusBox.className = 'status';
      statusBox.innerHTML = '';
    }

    function getUrlParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        team_code: (params.get('team_code') || params.get('team') || '').trim(),
        token: (params.get('token') || params.get('t') || '').trim()
      };
    }

    async function postJson(payload) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 20000);

      try {
        const res = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify(payload),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          signal: controller.signal
        });

        const text = await res.text();
        return JSON.parse(text);
      } catch (err) {
        if (err.name === 'AbortError') {
          throw new Error('Timeout chiamata backend');
        }
        throw err;
      } finally {
        clearTimeout(timeout);
      }
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function linkOrDash(url, label) {
      if (!url) return '-';
      const safeUrl = escapeHtml(url);
      return `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${label}</a>`;
    }

    function trashIconSvg() {
      return `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M9 3h6l1 2h4v2H4V5h4l1-2zm1 6h2v8h-2V9zm4 0h2v8h-2V9zM7 9h2v8H7V9zm-1 12a2 2 0 0 1-2-2V8h16v11a2 2 0 0 1-2 2H6z"></path>
        </svg>
      `;
    }

    function updateSummary(counters, rows) {
      document.getElementById('totGiocatori').textContent = counters?.Giocatore?.current ?? 0;
      document.getElementById('totAllenatori').textContent = counters?.Allenatore?.current ?? 0;
      document.getElementById('totDirigenti').textContent = counters?.Dirigente?.current ?? 0;
      document.getElementById('totaleIscritti').textContent = Array.isArray(rows) ? rows.length : 0;
    }

    function renderRows(rows) {
      rowsBody.innerHTML = '';

      if (!rows || rows.length === 0) {
        emptyBox.style.display = 'block';
        tableWrap.style.display = 'none';
        return;
      }

      emptyBox.style.display = 'none';
      tableWrap.style.display = 'block';

      rows.forEach((row, index) => {
        const tr = document.createElement('tr');
        tr.setAttribute('data-row-index', String(index));

        tr.innerHTML = `
          <td>${escapeHtml(row.nome || '')}</td>
          <td>${escapeHtml(row.cognome || '')}</td>
          <td>${escapeHtml(row.ruolo || '')}</td>
          <td>${escapeHtml(row.stato_pratica || '')}</td>
          <td>${linkOrDash(row.link_documento_identita, 'Apri')}</td>
          <td>${linkOrDash(row.link_visita_sportiva, 'Apri')}</td>
          <td>${linkOrDash(row.link_modulo_generato, 'Apri')}</td>
          <td class="actions-cell">
            <button
              type="button"
              class="btn-delete"
              title="Elimina iscritto"
              aria-label="Elimina iscritto"
              onclick="handleDeletePlayer(${index})"
            >
              ${trashIconSvg()}
            </button>
          </td>
        `;

        rowsBody.appendChild(tr);
      });
    }

    function setRowDeleting(index, deleting) {
      const tr = rowsBody.querySelector(`tr[data-row-index="${index}"]`);
      if (!tr) return;

      const btn = tr.querySelector('.btn-delete');
      if (deleting) {
        tr.classList.add('row-deleting');
        if (btn) btn.disabled = true;
      } else {
        tr.classList.remove('row-deleting');
        if (btn) btn.disabled = false;
      }
    }

    async function handleDeletePlayer(index) {
      const row = currentRows[index];
      if (!row) return;

      const nome = [row.nome || '', row.cognome || ''].join(' ').trim() || 'questo iscritto';

      const conferma =
        confirm(
          `Confermi l'eliminazione di ${nome}?\n\n` +
          `Verranno eliminati:\n` +
          `- il record dell'iscrizione\n` +
          `- il modulo generato\n` +
          `- la foto del documento\n` +
          `- la foto della visita sportiva`
        );

      if (!conferma) return;

      clearStatus();
      setRowDeleting(index, true);

      try {
        const data = await postJson({
          action: 'deletePlayerRegistration',
          team_code: currentTeamCode,
          token: currentToken,
          row_number: row.row_number,
          row_id: row.row_id || '',
          nome: row.nome || '',
          cognome: row.cognome || ''
        });

        if (!data.ok) {
          throw new Error(data.error || 'Errore durante l’eliminazione');
        }

        currentRows.splice(index, 1);

        if (data.counters) {
          currentCounters = data.counters;
        } else {
          currentCounters = recomputeCountersFromRows(currentRows);
        }

        updateSummary(currentCounters, currentRows);
        renderRows(currentRows);

        showStatus('ok', data.message || 'Iscritto eliminato correttamente.');
      } catch (err) {
        setRowDeleting(index, false);
        showStatus('err', err.message || 'Errore eliminazione iscritto');
      }
    }

    function recomputeCountersFromRows(rows) {
      const counters = {
        Giocatore: { current: 0 },
        Allenatore: { current: 0 },
        Dirigente: { current: 0 }
      };

      (rows || []).forEach(row => {
        const ruolo = (row.ruolo || '').trim();
        if (!counters[ruolo]) counters[ruolo] = { current: 0 };
        counters[ruolo].current += 1;
      });

      return counters;
    }

    async function loadTeamView() {
      const { team_code, token } = getUrlParams();
      currentTeamCode = team_code;
      currentToken = token;

      if (!team_code) {
        loadingBox.style.display = 'none';
        teamNameEl.textContent = 'Team mancante';
        showStatus('err', 'Nel link manca il parametro team.');
        showAppAfterSplash();
        return;
      }

      if (!token) {
        loadingBox.style.display = 'none';
        teamNameEl.textContent = 'Token mancante';
        showStatus('err', 'Nel link manca il token.');
        showAppAfterSplash();
        return;
      }

      try {
        const data = await postJson({
          action: 'getTeamView',
          team_code,
          token
        });

        if (!data.ok) {
          throw new Error(data.error || 'Errore caricamento squadra');
        }

        currentTeamName = data.team_name || team_code;
        currentRows = Array.isArray(data.rows) ? data.rows : [];
        currentCounters = data.counters || {};

        teamNameEl.textContent = currentTeamName;
        updateSummary(currentCounters, currentRows);
        renderRows(currentRows);

        loadingBox.style.display = 'none';
        contentBox.style.display = 'block';
      } catch (err) {
        loadingBox.style.display = 'none';
        teamNameEl.textContent = 'Squadra non disponibile';
        showStatus('err', err.message || 'Errore caricamento vista squadra');
      } finally {
        showAppAfterSplash();
      }
    }

    loadTeamView();
  </script>
</body>
</html>
